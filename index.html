<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ DGB EMAIL 10P RGB ⚡</title>
    <style>
        :root {
            --bg-dark: #070a13;
            --bg-card: #121829;
            --text-color: #ffffff;
            --text-muted: #8fa0dd;
            --rgb-gradient: linear-gradient(45deg, #ff0055, #00ff55, #00e1ff, #ff7700, #ff00ff, #00ff55, #00e1ff);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }

        .container {
            max-width: 600px;
            width: 100%;
            padding: 20px;
            box-shadow: 0 0 20px rgba(0, 225, 255, 0.2);
            border: 2px solid transparent;
            border-radius: 16px;
            background: 
                linear-gradient(var(--bg-card), var(--bg-card)) padding-box,
                linear-gradient(45deg, #ff0055, #00ff55, #00e1ff, #ff00ff) border-box;
        }

        h1 {
            text-align: center;
            font-size: 24px;
            font-weight: 800;
            background: var(--rgb-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
            animation: rgb-move 8s linear infinite;
            background-size: 400%;
        }

        .section {
            background: #182038;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            border: 1px solid #2d3960;
        }

        .responsive-group {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            flex-direction: column;
        }

        @media (min-width: 480px) {
            .responsive-group {
                flex-direction: row;
                align-items: center;
            }
            .responsive-group input[type="text"] {
                flex: 1;
            }
        }

        input[type="text"] {
            width: 100%;
            background: #0d1324;
            border: 1px solid #3d4f8a;
            color: #fff;
            padding: 12px;
            font-size: 14px;
            border-radius: 8px;
            outline: none;
            transition: 0.3s;
        }
        input[type="text"]:focus {
            border-color: #00e1ff;
            box-shadow: 0 0 10px rgba(0, 225, 255, 0.5);
        }

        button {
            padding: 12px 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
            color: #fff;
            background: #253157;
            transition: all 0.2s ease;
            text-transform: uppercase;
            white-space: nowrap; 
        }

        .btn-rgb {
            background: var(--rgb-gradient);
            background-size: 400%;
            color: #000;
            text-shadow: 0 0 1px #fff;
            animation: rgb-move 8s linear infinite;
        }
        .btn-rgb:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 12px rgba(255, 0, 85, 0.5);
        }

        @keyframes rgb-move {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        button:hover { background: #35477d; }

        .mail-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .badge {
            background: #ff0055;
            color: #fff;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 12px;
            box-shadow: 0 0 8px #ff0055;
        }

        .mail-item {
            background: #0d1324;
            border: 1px solid #2d3960;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 8px;
        }
        .mail-item:hover {
            border-color: #00ff55;
            box-shadow: 0 0 8px rgba(0, 255, 85, 0.2);
        }
        .mail-item .sender { color: #00e1ff; font-weight: bold; font-size: 12px; margin-bottom: 4px; }
        .mail-item .subject { font-size: 14px; }

        .empty-text { text-align: center; color: var(--text-muted); font-style: italic; padding: 15px; font-size: 13px; }

        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(4, 6, 12, 0.9); backdrop-filter: blur(4px);
            justify-content: center; align-items: center; z-index: 1000;
        }
        .modal-content {
            background: var(--bg-card); border: 2px solid #ff00ff;
            width: 95%; max-width: 550px; max-height: 80vh;
            border-radius: 12px; display: flex; flex-direction: column;
            overflow: hidden; box-shadow: 0 0 25px rgba(255, 0, 255, 0.4);
        }
        .modal-header { padding: 15px; border-bottom: 1px solid #2d3960; display: flex; justify-content: space-between; align-items: center;}
        .modal-body { padding: 15px; overflow-y: auto; background: #ffffff; color: #111; margin: 10px; border-radius: 8px;}
    </style>
</head>
<body>

<div class="container">
    <h1>⚡ Gia Bao Email 10P ⚡</h1>

    <div class="section">
        <div class="responsive-group">
            <input type="text" id="current-email" readonly value="Đang lọc đuôi chuẩn mail10...">
            <div style="display: flex; gap: 8px; min-width: 220px; justify-content: space-between;">
                <button onclick="copyEmail()" style="flex: 1;">Copy</button>
                <button class="btn-rgb" onclick="generateStrictMail()" style="flex: 2;">Đổi Ngẫu Nhiên</button>
            </div>
        </div>
        <p style="font-size: 11px; color: #00ff55; text-align: center; font-weight: bold;">🔒 Đang kích hoạt bộ lọc nghiêm ngặt: Chỉ dùng tên miền chứa chữ "mail" hoặc "10"</p>
    </div>

    <div class="section">
        <div class="mail-header">
            <h3>HỘP THƯ ĐẾN <span class="badge" id="mail-count">0</span></h3>
            <button onclick="checkMail()" style="padding: 6px 12px; font-size: 12px; border: 1px solid #2d3960;">🔄 Làm Mới</button>
        </div>
        <div id="mail-list-box">
            <div class="empty-text">Đang chờ mã OTP gửi về...</div>
        </div>
    </div>
</div>

<div id="mail-modal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <div>
                <h3 id="modal-subject" style="color: #00e1ff; font-size: 16px;"></h3>
                <p id="modal-from" style="font-size: 12px; color: var(--text-muted); margin-top:3px;"></p>
            </div>
            <button onclick="closeModal()" style="background: #ff0055; padding: 6px 12px; font-size: 12px;">Đóng</button>
        </div>
        <div id="modal-body" class="modal-body"></div>
    </div>
</div>

<script>
    const API_URL = 'https://api.mail.tm';
    let token = "";
    let activeEmail = "";
    let lastMailCount = 0;

    async function init() {
        if (Notification.permission !== "granted" && Notification.permission !== "denied") {
            Notification.requestPermission();
        }
        await generateStrictMail();
        setInterval(checkMail, 5000);
    }

    function randomStr(len) {
        return Math.random().toString(36).substring(2, 2 + len);
    }

    async function generateStrictMail() {
        document.getElementById('current-email').value = "Đang rà soát đuôi mail10...";
        try {
            const domRes = await fetch(`${API_URL}/domains`);
            const domData = await domRes.json();
            const domains = domData['hydra:member'];

            // Vòng lặp quét nghiêm ngặt: Tìm bằng được đuôi có chữ 'mail' hoặc chữ '10'
            let validDomains = domains.filter(d => d.domain.includes('mail') || d.domain.includes('10'));
            
            let targetDomain = "";
            if (validDomains.length > 0) {
                // Chọn một đuôi chuẩn ngẫu nhiên trong danh sách đã lọc sạch
                targetDomain = validDomains[Math.floor(Math.random() * validDomains.length)].domain;
            } else {
                // Nếu API lúc đó không có đuôi mail/10, tự động backup đuôi mặc định đẹp nhất
                targetDomain = domains[0].domain;
            }

            const username = randomStr(8) + "@" + targetDomain;
            const password = randomStr(12);

            const createRes = await fetch(`${API_URL}/accounts`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ address: username, password: password })
            });

            if(!createRes.ok) throw new Error();

            const tokenRes = await fetch(`${API_URL}/token`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ address: username, password: password })
            });
            const tokenData = await tokenRes.json();
            
            token = tokenData.token;
            activeEmail = username;
            lastMailCount = 0;

            document.getElementById('current-email').value = activeEmail;
            document.getElementById('mail-list-box').innerHTML = '<div class="empty-text">Hộp thư sạch đã kích hoạt. Đang đợi mã OTP...</div>';
            document.getElementById('mail-count').innerText = "0";

        } catch(e) {
            document.getElementById('current-email').value = "Đang thử lại kết nối sạch...";
            setTimeout(generateStrictMail, 1000);
        }
    }

    async function checkMail() {
        if (!token) return;
        try {
            const res = await fetch(`${API_URL}/messages`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await res.json();
            const messages = data['hydra:member'];

            const currentCount = messages.length;
            document.getElementById('mail-count').innerText = currentCount;
            const listDiv = document.getElementById('mail-list-box');

            if (currentCount > lastMailCount) {
                document.title = `📩 (${currentCount}) Bạn có thư mới!`;
                lastMailCount = currentCount;
            }

            if (currentCount === 0) {
                listDiv.innerHTML = '<div class="empty-text">Đang chờ mã xác nhận gửi về...</div>';
                return;
            }

            listDiv.innerHTML = '';
            messages.forEach(msg => {
                const item = document.createElement('div');
                item.className = 'mail-item';
                item.innerHTML = `
                    <div class="sender">Từ: ${msg.from.address}</div>
                    <div class="subject">${msg.subject || '(Không tiêu đề)'}</div>
                `;
                item.onclick = () => openMail(msg.id);
                listDiv.appendChild(item);
            });
        } catch (e) { console.log("Lỗi tải tin nhắn"); }
    }

    async function openMail(id) {
        try {
            const res = await fetch(`${API_URL}/messages/${id}`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const mail = await res.json();
            
            document.getElementById('modal-subject').innerText = mail.subject || '(Không tiêu đề)';
            document.getElementById('modal-from').innerText = `Từ: ${mail.from.address}`;
            
            const bodyContent = mail.html ? mail.html[0] : mail.text;
            document.getElementById('modal-body').innerHTML = `<div style="color:#111; font-family:sans-serif;">${bodyContent}</div>`;
            document.getElementById('mail-modal').style.display = 'flex';
        } catch (e) { alert("Không mở được thư!"); }
    }

    function closeModal() { document.getElementById('mail-modal').style.display = 'none'; }

    function copyEmail() {
        if(!activeEmail) return;
        const tempInput = document.createElement('input');
        tempInput.value = activeEmail; 
        document.body.appendChild(tempInput);
        tempInput.select();
        document.execCommand('copy');
        document.body.removeChild(tempInput);
        alert('Đã copy mail chuẩn!');
    }

    init();
</script>
</body>
</html>
