<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ DGB EMAIL 10P RGB ⚡</title>
    <style>
        :root {
            --bg-dark: #070a13;
            --bg-card: #121829;
            --text-color: #ffffff;
            --text-muted: #8fa0dd;
            --rgb-gradient: linear-gradient(45deg, #ff0055, #00ff55, #00e1ff, #ff7700, #ff00ff, #00ff55, #00e1ff);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }

        .container {
            max-width: 600px;
            width: 100%;
            padding: 20px;
            box-shadow: 0 0 20px rgba(0, 225, 255, 0.2);
            border: 2px solid transparent;
            border-radius: 16px;
            background: 
                linear-gradient(var(--bg-card), var(--bg-card)) padding-box,
                linear-gradient(45deg, #ff0055, #00ff55, #00e1ff, #ff00ff) border-box;
        }

        h1 {
            text-align: center;
            font-size: 24px;
            font-weight: 800;
            background: var(--rgb-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
            animation: rgb-move 8s linear infinite;
            background-size: 400%;
        }

        .section {
            background: #182038;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            border: 1px solid #2d3960;
        }

        .responsive-group {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            flex-direction: column;
        }

        @media (min-width: 480px) {
            .responsive-group {
                flex-direction: row;
                align-items: center;
            }
            .responsive-group input[type="text"] {
                flex: 1;
            }
        }

        input[type="text"] {
            width: 100%;
            background: #0d1324;
            border: 1px solid #3d4f8a;
            color: #fff;
            padding: 12px;
            font-size: 14px;
            border-radius: 8px;
            outline: none;
            transition: 0.3s;
        }
        input[type="text"]:focus {
            border-color: #00e1ff;
            box-shadow: 0 0 10px rgba(0, 225, 255, 0.5);
        }

        button {
            padding: 12px 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
            color: #fff;
            background: #253157;
            transition: all 0.2s ease;
            text-transform: uppercase;
            white-space: nowrap; 
        }

        .btn-history-toggle {
            border: 1px solid #00e1ff !important; 
            color: #00e1ff !important; 
            background: transparent !important; 
            width: 100%;
            white-space: normal !important; 
            word-wrap: break-word;
            line-height: 1.5; 
            padding: 10px 15px;
        }

        .btn-rgb {
            background: var(--rgb-gradient);
            background-size: 400%;
            color: #000;
            text-shadow: 0 0 1px #fff;
            animation: rgb-move 8s linear infinite;
        }
        .btn-rgb:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 12px rgba(255, 0, 85, 0.5);
        }

        @keyframes rgb-move {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        button:hover { background: #35477d; }

        .menu-list-btn-container {
            display: flex;
            justify-content: center;
            margin-bottom: 10px;
        }
        
        .dropdown-history {
            display: none;
            background: #0d1324;
            border: 2px solid #00e1ff;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 15px;
            max-height: 200px;
            overflow-y: auto;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px;
            border-bottom: 1px solid #1f2b4d;
            font-size: 13px;
        }
        .history-item span {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 75%;
        }
        .history-item.active {
            color: #00ff55;
            font-weight: bold;
        }

        .mail-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .badge {
            background: #ff0055;
            color: #fff;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 12px;
            box-shadow: 0 0 8px #ff0055;
        }

        .mail-item {
            background: #0d1324;
            border: 1px solid #2d3960;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 8px;
        }
        .mail-item:hover {
            border-color: #00ff55;
            box-shadow: 0 0 8px rgba(0, 255, 85, 0.2);
        }
        .mail-item .sender { color: #00e1ff; font-weight: bold; font-size: 12px; margin-bottom: 4px; }
        .mail-item .subject { font-size: 14px; }

        .empty-text { text-align: center; color: var(--text-muted); font-style: italic; padding: 15px; font-size: 13px; }

        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(4, 6, 12, 0.9); backdrop-filter: blur(4px);
            justify-content: center; align-items: center; z-index: 1000;
        }
        .modal-content {
            background: var(--bg-card); border: 2px solid #ff00ff;
            width: 95%; max-width: 550px; max-height: 80vh;
            border-radius: 12px; display: flex; flex-direction: column;
            overflow: hidden; box-shadow: 0 0 25px rgba(255, 0, 255, 0.4);
        }
        .modal-header { padding: 15px; border-bottom: 1px solid #2d3960; display: flex; justify-content: space-between; align-items: center;}
        .modal-body { padding: 15px; overflow-y: auto; background: #ffffff; color: #111; margin: 10px; border-radius: 8px;}
    </style>
</head>
<body>

<div class="container">
    <h1>⚡ Gia Bao Email 10P ⚡</h1>

    <div class="section">
        <div class="responsive-group">
            <input type="text" id="current-email" readonly value="Đang lấy domain bypass ẩn danh...">
            <div style="display: flex; gap: 8px; min-width: 220px; justify-content: space-between;">
                <button onclick="copyEmail()" style="flex: 1;">Copy</button>
                <button class="btn-rgb" onclick="generateRandomEmail()" style="flex: 2;">Đổi Ngẫu Nhiên</button>
            </div>
        </div>

        <div class="responsive-group">
            <input type="text" id="custom-username" placeholder="Tự đặt tên tùy ý (Ví dụ: giabao.pro)">
            <div style="display: flex; min-width: 220px;">
                <button class="btn-rgb" onclick="createCustomEmail()" style="width: 100%;">Áp Dụng Tên</button>
            </div>
        </div>

        <div class="menu-list-btn-container">
            <button onclick="toggleHistoryMenu()" class="btn-history-toggle">
                📜 Bấm để đóng/mở Danh sách Email đã dùng
            </button>
        </div>

        <div id="dropdown-history-box" class="dropdown-history">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                <h4 style="color: #00e1ff; font-size: 13px;">Chọn email cũ để xem lại:</h4>
                <button onclick="clearHistory()" style="background: #ff0055; padding: 2px 8px; font-size: 10px; border-radius: 4px;">Xóa hết</button>
            </div>
            <div id="history-list-render"></div>
        </div>
    </div>

    <div class="section">
        <div class="mail-header">
            <h3>HỘP THƯ ĐẾN <span class="badge" id="mail-count">0</span></h3>
            <button onclick="checkMail()" style="padding: 6px 12px; font-size: 12px; border: 1px solid #2d3960;">🔄 Làm Mới</button>
        </div>
        <div id="mail-list-box">
            <div class="empty-text">Đang chờ tin nhắn gửi về...</div>
        </div>
    </div>
</div>

<div id="mail-modal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <div>
                <h3 id="modal-subject" style="color: #00e1ff; font-size: 16px;"></h3>
                <p id="modal-from" style="font-size: 12px; color: var(--text-muted); margin-top:3px;"></p>
            </div>
            <button onclick="closeModal()" style="background: #ff0055; padding: 6px 12px; font-size: 12px;">Đóng</button>
        </div>
        <div id="modal-body" class="modal-body"></div>
    </div>
</div>

<script>
    const API_URL = 'https://guerrero.to/api/v1';
    let activeEmail = "";
    let emailHistory = []; 
    let lastMailCount = 0;
    let cachedDomains = [];

    async function init() {
        if (Notification.permission !== "granted" && Notification.permission !== "denied") {
            Notification.requestPermission();
        }

        const savedHistory = localStorage.getItem('dgb_gr_history');
        if (savedHistory) emailHistory = JSON.parse(savedHistory);

        const savedActive = localStorage.getItem('dgb_gr_active');
        if (savedActive) activeEmail = savedActive;

        try {
            const res = await fetch(`${API_URL}/domains`);
            cachedDomains = await res.json();
        } catch(e) {
            cachedDomains = ['guerrero.to', 'coffeepancakes.xyz', 'lizardfury.com'];
        }

        if (activeEmail) {
            document.getElementById('current-email').value = activeEmail;
            renderHistory();
            checkMail();
        } else {
            generateRandomEmail();
        }

        setInterval(checkMail, 5000); 
    }

    function randomStr(len) {
        const chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
        let result = '';
        for (let i = 0; i < len; i++) {
            result += chars.charAt(Math.floor(Math.random() * chars.length));
        }
        return result;
    }

    function generateRandomEmail() {
        if(cachedDomains.length === 0) {
            setTimeout(generateRandomEmail, 500);
            return;
        }
        const randUser = randomStr(9);
        const randDom = cachedDomains[Math.floor(Math.random() * cachedDomains.length)];
        setNewEmail(`${randUser}@${randDom}`);
    }

    function createCustomEmail() {
        if(cachedDomains.length === 0) return alert("Hệ thống chưa tải xong tên miền, vui lòng đợi vài giây!");
        const inputName = document.getElementById('custom-username').value.trim();
        if(!inputName) return alert("Vui lòng nhập tên email bạn muốn!");
        
        const cleanName = inputName.toLowerCase().replace(/[^a-z0-9.]/g, "");
        const randDom = cachedDomains[Math.floor(Math.random() * cachedDomains.length)];
        setNewEmail(`${cleanName}@${randDom}`);
        document.getElementById('custom-username').value = '';
    }

    function setNewEmail(email) {
        activeEmail = email;
        document.getElementById('current-email').value = email;
        lastMailCount = 0;

        localStorage.setItem('dgb_gr_active', activeEmail);

        if (!emailHistory.includes(email)) {
            emailHistory.push(email);
            localStorage.setItem('dgb_gr_history', JSON.stringify(emailHistory));
            renderHistory();
        }

        document.getElementById('mail-list-box').innerHTML = '<div class="empty-text">Hòm thư ẩn danh đã kích hoạt. Đang đợi mã OTP...</div>';
        document.getElementById('mail-count').innerText = "0";
        checkMail();
    }

    async function checkMail() {
        if (!activeEmail) return;
        const [username, domain] = activeEmail.split('@');
        try {
            const res = await fetch(`${API_URL}/mailbox/${username}/${domain}`);
            const messages = await res.json();
            
            if (!Array.isArray(messages)) return;
            
            const currentCount = messages.length;
            document.getElementById('mail-count').innerText = currentCount;
            const listDiv = document.getElementById('mail-list-box');
            
            if (currentCount > lastMailCount) {
                document.title = `📩 (${currentCount}) Có OTP mới!`;
                if (Notification.permission === "granted") {
                    const latestMsg = messages[0]; 
                    new Notification("⚡ DGB EMAIL BYPASS", {
                        body: `Từ: ${latestMsg.from}\nTiêu đề: ${latestMsg.subject}`,
                    });
                }
                lastMailCount = currentCount; 
            }

            if (currentCount === 0) {
                listDiv.innerHTML = '<div class="empty-text">Hộp thư trống. Đang chờ mã xác nhận...</div>';
                lastMailCount = 0;
                document.title = "⚡ DGB EMAIL 10P RGB ⚡";
                return;
            }

            listDiv.innerHTML = '';
            messages.forEach(msg => {
                const item = document.createElement('div');
                item.className = 'mail-item';
                item.innerHTML = `
                    <div class="sender">Người gửi: ${msg.from}</div>
                    <div class="subject">${msg.subject || '(Không tiêu đề)'}</div>
                `;
                item.onclick = () => openMail(msg.id);
                listDiv.appendChild(item);
            });
        } catch (error) { console.log("Đang quét thư đến..."); }
    }

    async function openMail(id) {
        const [username, domain] = activeEmail.split('@');
        try {
            const res = await fetch(`${API_URL}/message/${username}/${domain}/${id}`);
            const mail = await res.json();
            
            document.getElementById('modal-subject').innerText = mail.subject || '(Không tiêu đề)';
            document.getElementById('modal-from').innerText = `Từ: ${mail.from}`;
            
            // Render nội dung HTML hoặc Text một cách an toàn
            const bodyContent = mail.html || mail.text.replace(/\n/g, '<br>');
            document.getElementById('modal-body').innerHTML = `<div style="color:#111; font-family:sans-serif;">${bodyContent}</div>`;
            document.getElementById('mail-modal').style.display = 'flex';
        } catch (e) { alert("Lỗi khi mở nội dung email!"); }
    }

    function closeModal() { document.getElementById('mail-modal').style.display = 'none'; }

    function toggleHistoryMenu() {
        const box = document.getElementById('dropdown-history-box');
        box.style.display = box.style.display === 'block' ? 'none' : 'block';
    }

    function renderHistory() {
        const historyList = document.getElementById('history-list-render');
        historyList.innerHTML = '';
        emailHistory.forEach((email) => {
            const isActive = activeEmail === email;
            const item = document.createElement('div');
            item.className = `history-item ${isActive ? 'active' : ''}`;
            item.innerHTML = `
                <span>${email}</span>
                <button class="btn-rgb" style="padding: 4px 10px; font-size:11px; color:#000;" onclick="switchEmail('${email}')">Chọn</button>
            `;
            historyList.appendChild(item);
        });
    }

    function switchEmail(email) {
        setNewEmail(email);
        toggleHistoryMenu(); 
    }

    function clearHistory() {
        if(confirm("Xóa lịch sử dụng các email cũ?")) {
            emailHistory = [];
            activeEmail = "";
            localStorage.removeItem('dgb_gr_history');
            localStorage.removeItem('dgb_gr_active');
            generateRandomEmail();
        }
    }

    function copyEmail() {
        if(!activeEmail) return;
        const tempInput = document.createElement('input');
        tempInput.value = activeEmail; 
        document.body.appendChild(tempInput);
        tempInput.select();
        document.execCommand('copy');
        document.body.removeChild(tempInput);
        alert('Đã copy mail bypass! Thử dán lại vào ô đăng ký nhé.');
    }

    init();
</script>
</body>
</html>
